<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela Mundial 2026 ⚽</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{
  --wc-red:#C8102E;
  --wc-green:#00A651;
  --wc-blue:#003DA5;
  --wc-purple:#6A0DAD;
  --wc-yellow:#FFD700;
  --wc-light:#f5f5f5;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0ee;color:#1a1a1a;min-height:100vh}
.hero{background:var(--wc-blue);padding:1.75rem 1rem 1.25rem;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:0;left:0;width:33.3%;height:100%;background:var(--wc-red);opacity:0.85}
.hero::after{content:'';position:absolute;top:0;right:0;width:25%;height:100%;background:var(--wc-green);opacity:0.85}
.hero-inner{position:relative;z-index:1}
.hero-ball{font-size:48px;display:block;margin-bottom:8px}
.hero h1{font-size:26px;font-weight:800;color:#fff;margin-bottom:4px;letter-spacing:1px;text-shadow:0 1px 4px rgba(0,0,0,0.3)}
.hero p{font-size:14px;color:rgba(255,255,255,0.85);margin-bottom:1rem}
.hero-flags{display:flex;justify-content:center;gap:5px;flex-wrap:wrap}
.hf{width:38px;height:26px;object-fit:cover;border-radius:4px;border:1.5px solid rgba(255,255,255,0.35)}
.container{max-width:600px;margin:0 auto;padding:1.25rem 1rem 3rem}
.tabs{display:flex;gap:4px;margin-bottom:1.25rem;background:#fff;border-radius:12px;padding:5px;border:1px solid #e0e0d8}
.tab{flex:1;padding:10px 6px;text-align:center;font-size:12px;font-weight:700;border-radius:8px;cursor:pointer;border:none;background:transparent;color:#888;transition:all 0.15s}
.tab i{display:block;font-size:20px;margin-bottom:3px}
.tab.active{color:#fff}
.tab:nth-child(1).active{background:var(--wc-blue)}
.tab:nth-child(2).active{background:#2E8B57}
.tab:nth-child(3).active{background:var(--wc-red)}
.tab:nth-child(4).active{background:var(--wc-green)}
.section{display:none}
.section.active{display:block}
.login-card{background:#fff;border:1px solid #e0e0d8;border-radius:14px;padding:1.75rem;max-width:380px;margin:0 auto;border-top:4px solid var(--wc-blue)}
.login-top{text-align:center;margin-bottom:1.5rem}
.login-top .ball{font-size:42px}
.login-top h2{font-size:20px;font-weight:800;margin-top:8px;margin-bottom:4px}
.login-top p{font-size:13px;color:#666}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:#555;margin-bottom:5px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px}
.field input{width:100%;padding:11px 14px;font-size:15px;border:1.5px solid #d0d0c8;border-radius:9px;background:#fafaf8;color:#1a1a1a;outline:none;transition:border-color 0.15s}
.field input:focus{border-color:var(--wc-blue)}
.btn-verde{width:100%;padding:12px;font-size:15px;font-weight:700;background:var(--wc-blue);color:#fff;border:none;border-radius:10px;cursor:pointer;transition:opacity 0.15s;letter-spacing:0.3px}
.btn-verde:hover{opacity:0.86}
.saved-title{font-size:12px;color:#999;margin:1.25rem 0 8px;text-align:center;position:relative}
.saved-title::before,.saved-title::after{content:'';position:absolute;top:50%;width:36%;height:1px;background:#e0e0d8}
.saved-title::before{left:0}.saved-title::after{right:0}
.chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center}
.chip{padding:7px 16px;font-size:13px;font-weight:700;border-radius:99px;cursor:pointer;background:#e8eeff;color:var(--wc-blue);border:none;transition:background 0.1s}
.chip:hover{background:#c8d4ff}
.user-bar{background:var(--wc-blue);border-radius:10px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.user-bar span{font-size:14px;color:#fff;font-weight:700}
.logout-btn{font-size:12px;color:rgba(255,255,255,0.8);background:rgba(255,255,255,0.15);border:none;border-radius:6px;padding:5px 12px;cursor:pointer;font-weight:600}
.group-lbl{font-size:11px;font-weight:700;color:#fff;border-radius:6px;padding:5px 12px;margin:1.25rem 0 8px;display:inline-block;letter-spacing:0.6px;text-transform:uppercase}
/* date separator */
.date-sep{font-size:13px;font-weight:700;color:#555;padding:8px 0 6px;margin-top:1rem;border-bottom:1px solid #e0e0d8;margin-bottom:8px}
.glbl-a{background:var(--wc-red)}.glbl-b{background:var(--wc-blue)}.glbl-c{background:var(--wc-green)}
.glbl-d{background:var(--wc-purple)}.glbl-e{background:#E67E00}.glbl-f{background:#00868A}
.glbl-q{background:var(--wc-red)}.glbl-s{background:var(--wc-purple)}.glbl-f2{background:var(--wc-yellow);color:#1a1a1a}
.glbl-g{background:#008080}.glbl-h{background:#8B008B}.glbl-i{background:#B8860B}
.glbl-j{background:#2E8B57}.glbl-k{background:#4169E1}.glbl-l{background:#DC143C}
.match-card{background:#fff;border:1px solid #e0e0d8;border-radius:14px;padding:13px 15px;margin-bottom:9px;border-left:4px solid #e0e0d8}
.match-card.group-a{border-left-color:var(--wc-red)}.match-card.group-b{border-left-color:var(--wc-blue)}
.match-card.group-c{border-left-color:var(--wc-green)}.match-card.group-d{border-left-color:var(--wc-purple)}
.match-card.group-e{border-left-color:#E67E00}.match-card.group-f{border-left-color:#00868A}
.match-card.group-g{border-left-color:#008080}.match-card.group-h{border-left-color:#8B008B}
.match-card.group-i{border-left-color:#B8860B}.match-card.group-j{border-left-color:#2E8B57}
.match-card.group-k{border-left-color:#4169E1}.match-card.group-l{border-left-color:#DC143C}
.match-card.group-q{border-left-color:var(--wc-red)}.match-card.group-s{border-left-color:var(--wc-purple)}
.match-card.group-final{border-left-color:var(--wc-yellow);border-left-width:5px}
.match-card.locked{background:#fafaf8;opacity:.85}
.match-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.match-date{font-size:12px;color:#888}
.badge{font-size:11px;padding:4px 10px;border-radius:99px;font-weight:700}
.badge-open{background:#e8f4ff;color:var(--wc-blue)}
.badge-done{background:#eeffee;color:var(--wc-green)}
.badge-locked{background:#fff3cd;color:#856404}
.teams{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center}
.team{text-align:center}
.team-flag{width:58px;height:39px;object-fit:cover;border-radius:7px;border:1.5px solid #e0e0d8;display:block;margin:0 auto}
.team-flag-placeholder{width:58px;height:39px;border-radius:7px;border:1.5px solid #e0e0d8;display:flex;align-items:center;justify-content:center;background:#f8f8f4;font-size:22px;margin:0 auto}
.team-name{font-size:12px;font-weight:700;margin-top:6px;color:#1a1a1a}
.vs-block{display:flex;flex-direction:column;align-items:center;gap:5px}
.score-row{display:flex;align-items:center;gap:6px}
.sinput{width:44px;height:44px;text-align:center;font-size:20px;font-weight:700;border:2px solid #c8d4ff;border-radius:9px;background:#f5f8ff;color:var(--wc-blue);outline:none;transition:border-color 0.15s}
.sinput:focus{border-color:var(--wc-blue)}
.sinput:disabled{background:#f0f0ea;border-color:#ddd;color:#aaa;cursor:not-allowed}
.sdash{font-size:22px;font-weight:700;color:#ccc}
.real-score-row{display:flex;align-items:center;gap:5px}
.rscore{font-size:30px;font-weight:800;color:var(--wc-blue);min-width:30px;text-align:center;line-height:1}
.rdash{font-size:20px;color:#ccc;font-weight:700}
.pred-row{display:flex;align-items:center;justify-content:space-between;margin-top:9px;flex-wrap:wrap;gap:6px;padding-top:9px;border-top:1px solid #f0f0e8}
.pred-note{font-size:12px;color:#888}
.pts-badge{font-size:12px;font-weight:700;padding:4px 12px;border-radius:99px}
.pts3{background:#e8ffe8;color:var(--wc-green)}.pts1{background:#e8eeff;color:var(--wc-blue)}.pts0{background:#f4f4f0;color:#888}
.save-btn{margin-top:9px;width:100%;padding:8px;font-size:13px;font-weight:700;background:transparent;border:1.5px solid #c8d4ff;border-radius:9px;cursor:pointer;color:var(--wc-blue);transition:all 0.15s}
.save-btn:hover{background:#e8eeff}
.save-ok{color:var(--wc-green);border-color:var(--wc-green);background:#e8ffe8}
.locked-msg{margin-top:9px;width:100%;padding:8px;font-size:12px;font-weight:700;background:#fff3cd;border:1.5px solid #ffc107;border-radius:9px;color:#856404;text-align:center}
.countdown{margin-top:6px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px;display:inline-block}
.countdown-ok{background:#e8f4ff;color:var(--wc-blue)}
.countdown-warn{background:#fff3cd;color:#856404}
.countdown-urgent{background:#FCEBEB;color:var(--wc-red);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.lb-wrap{background:#fff;border:1px solid #e0e0d8;border-radius:14px;overflow:hidden}
.lb-header-row{display:grid;grid-template-columns:36px 1fr 46px 46px 46px 52px;gap:6px;align-items:center;padding:10px 14px;font-size:11px;font-weight:700;color:#fff;background:var(--wc-blue);text-transform:uppercase;letter-spacing:0.4px}
.lb-row{display:grid;grid-template-columns:36px 1fr 46px 46px 46px 52px;gap:6px;align-items:center;padding:13px 14px;font-size:13px;border-bottom:1px solid #f0f0e8}
.lb-row:last-child{border-bottom:none}
.lb-row.gold{background:#fff8e1;border-left:4px solid var(--wc-yellow)}
.lb-row.silver{background:#f5f5f5;border-left:4px solid #ccc}
.lb-rank{font-size:18px;text-align:center}
.lb-name{font-weight:700}
.lb-me{color:var(--wc-blue)}
.lb-num{text-align:center;color:#888;font-size:12px}
.lb-pts{text-align:center;font-weight:800;font-size:17px;color:var(--wc-red)}
.legend{border-radius:10px;padding:13px 15px;margin-top:1rem;display:flex;gap:0;overflow:hidden;border-radius:10px}
.legend-seg{flex:1;padding:12px 10px;text-align:center}
.legend-seg:nth-child(1){background:var(--wc-blue)}.legend-seg:nth-child(2){background:var(--wc-green)}.legend-seg:nth-child(3){background:var(--wc-red)}
.legend-seg p{font-size:18px;font-weight:800;color:#fff;margin-bottom:2px}
.legend-seg span{font-size:11px;color:rgba(255,255,255,0.85);font-weight:600}
.admin-info{background:var(--wc-blue);border-radius:10px;padding:11px 14px;margin-bottom:1rem;font-size:13px;color:#fff;font-weight:600}
.admin-card{background:#fff;border:1px solid #e0e0d8;border-radius:14px;padding:13px 15px;margin-bottom:9px}
.admin-card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;flex-wrap:wrap;gap:6px}
.admin-teams{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;flex-wrap:wrap}
.admin-flag{width:28px;height:19px;object-fit:cover;border-radius:3px;border:1px solid #e0e0d8}
.admin-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.admin-row label{font-size:12px;color:#888;font-weight:600}
.ainput{width:40px;text-align:center;padding:7px;font-size:15px;font-weight:700;border:1.5px solid #d0d0c8;border-radius:8px;background:#fafaf8;color:#1a1a1a;outline:none}
.ainput:focus{border-color:var(--wc-blue)}
.set-btn{padding:7px 15px;font-size:13px;font-weight:700;background:var(--wc-blue);color:#fff;border:none;border-radius:8px;cursor:pointer}
.del-btn{padding:7px 11px;font-size:13px;font-weight:700;background:#FCEBEB;color:var(--wc-red);border:none;border-radius:8px;cursor:pointer}
@media(max-width:480px){
  .lb-header-row,.lb-row{grid-template-columns:30px 1fr 38px 38px 38px 44px;gap:4px;padding:10px}
  .team-flag,.team-flag-placeholder{width:46px;height:31px}
  .rscore{font-size:26px}
  .legend-seg p{font-size:15px}
}

/* CALENDAR */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav-btn{background:#fff;border:1px solid #e0e0d8;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:14px;font-weight:700;color:var(--wc-blue)}
.cal-nav-btn:hover{background:#e8eeff}
.cal-month{font-size:16px;font-weight:800;color:#1a1a1a}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dow{text-align:center;font-size:10px;font-weight:700;color:#aaa;padding:4px 0;text-transform:uppercase}
.cal-day{background:#fff;border:1px solid #e8e8e0;border-radius:8px;min-height:62px;padding:4px;position:relative}
.cal-day.empty{background:transparent;border-color:transparent}
.cal-day.today{border-color:var(--wc-blue);border-width:2px}
.cal-day-num{font-size:11px;font-weight:700;color:#888;margin-bottom:3px}
.cal-day.today .cal-day-num{color:var(--wc-blue)}
.cal-match-chip{font-size:9px;font-weight:700;padding:2px 4px;border-radius:4px;margin-bottom:2px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;transition:opacity .1s}
.cal-match-chip:hover{opacity:.8}
.cal-match-chip.open{background:#e8eeff;color:var(--wc-blue)}
.cal-match-chip.locked{background:#fff3cd;color:#856404}
.cal-match-chip.done{background:#e8ffe8;color:var(--wc-green)}
.cal-match-chip.pred{background:#EAF3DE;color:#3B6D11}
.cal-more{font-size:9px;color:#aaa;font-weight:600;margin-top:1px}
/* match detail modal */
.cal-modal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:flex-end;justify-content:center;z-index:200}
.cal-modal-box{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:600px;padding:20px;max-height:80vh;overflow-y:auto}
.cal-modal-title{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.cal-modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#aaa}


.pin-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:300}
.pin-box{background:#fff;border-radius:16px;padding:24px;width:300px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.pin-title{font-size:16px;font-weight:800;margin-bottom:4px}
.pin-sub{font-size:13px;color:#888;margin-bottom:16px}
.pin-dots{display:flex;justify-content:center;gap:10px;margin-bottom:16px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid #d0d0c8;background:#fff;transition:all .15s}
.pin-dot.filled{background:var(--wc-blue);border-color:var(--wc-blue)}
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.pin-key{padding:14px;font-size:20px;font-weight:700;border:1px solid #e0e0d8;border-radius:10px;cursor:pointer;background:#fafaf8;transition:all .15s;color:#1a1a1a}
.pin-key:hover{background:#e8eeff;border-color:var(--wc-blue)}
.pin-key.del{color:var(--wc-red);font-size:16px}
.pin-error{color:var(--wc-red);font-size:13px;font-weight:700;margin-bottom:8px;min-height:18px}
.pin-cancel{font-size:13px;color:#aaa;background:none;border:none;cursor:pointer;text-decoration:underline}


.all-preds{margin-top:10px;padding-top:10px;border-top:1px solid #f0f0e8}
.all-preds-title{font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.all-preds-title:hover{color:#666}
.pred-list{display:flex;flex-direction:column;gap:4px}
.pred-item{display:flex;align-items:center;justify-content:space-between;font-size:12px;padding:4px 8px;border-radius:6px;background:#f8f8f4}
.pred-item-name{font-weight:600;color:#555}
.pred-item-score{font-weight:700;font-family:monospace;font-size:13px}
.pred-item.pts3{background:#e8ffe8}.pred-item.pts3 .pred-item-score{color:var(--wc-green)}
.pred-item.pts1{background:#e8eeff}.pred-item.pts1 .pred-item-score{color:var(--wc-blue)}
.pred-item.pts0{background:#f4f4f0}.pred-item.pts0 .pred-item-score{color:#aaa}
.pred-item.nopred{background:#fafaf8}.pred-item.nopred .pred-item-score{color:#ccc}

</style>
</head>
<body>
<div class="hero">
  <div class="hero-inner">
  <span class="hero-ball">⚽</span>
  <h1>Mundial 2026</h1>
  <p>Quiniela — compite con tus amigos</p>
  <div class="hero-flags">
    <img class="hf" src="https://flagcdn.com/w40/mx.png" alt="México"><img class="hf" src="https://flagcdn.com/w40/us.png" alt="USA">
    <img class="hf" src="https://flagcdn.com/w40/ca.png" alt="Canadá"><img class="hf" src="https://flagcdn.com/w40/br.png" alt="Brasil">
    <img class="hf" src="https://flagcdn.com/w40/ar.png" alt="Argentina"><img class="hf" src="https://flagcdn.com/w40/fr.png" alt="Francia">
    <img class="hf" src="https://flagcdn.com/w40/de.png" alt="Alemania"><img class="hf" src="https://flagcdn.com/w40/es.png" alt="España">
    <img class="hf" src="https://flagcdn.com/w40/gb-eng.png" alt="Inglaterra"><img class="hf" src="https://flagcdn.com/w40/pt.png" alt="Portugal">
    <img class="hf" src="https://flagcdn.com/w40/nl.png" alt="Países Bajos"><img class="hf" src="https://flagcdn.com/w40/jp.png" alt="Japón">
    <img class="hf" src="https://flagcdn.com/w40/uy.png" alt="Uruguay"><img class="hf" src="https://flagcdn.com/w40/ma.png" alt="Marruecos">
    <img class="hf" src="https://flagcdn.com/w40/hr.png" alt="Croacia"><img class="hf" src="https://flagcdn.com/w40/cl.png" alt="Chile">
  </div>
  </div>
</div>

<div class="container">
  <div id="login-section">
    <div class="login-card">
      <div class="login-top"><div class="ball">⚽</div><h2>¡Únete a la quiniela!</h2><p>Pon tu nombre para guardar tus pronósticos</p></div>
      <div class="field"><label>Tu nombre o apodo</label><input type="text" id="name-input" placeholder="Ej: Juancho, El Profe..." maxlength="20"></div>
      <div class="field"><label>PIN (4 dígitos)</label><input type="password" id="pin-input" placeholder="••••" maxlength="4" inputmode="numeric" pattern="[0-9]*"></div>
      <button class="btn-verde">⚽ Entrar a la quiniela</button>
      <div id="saved-section" style="display:none"><p class="saved-title">o elige tu perfil</p><div class="chips" id="chips"></div></div>
    </div>
  </div>
  <div id="main-app" style="display:none">
    <div class="user-bar"><span id="welcome-msg"></span><button class="logout-btn">Cambiar usuario</button></div>
    <div class="tabs">
      <button class="tab active"><i class="ti ti-ball-football"></i>Partidos</button>
      <button class="tab"><i class="ti ti-calendar"></i>Calendario</button>
      <button class="tab"><i class="ti ti-trophy"></i>Ranking</button>
      <button class="tab" id="tab-btn-admin"><i class="ti ti-shield-star"></i>Admin</button>
    </div>
    <div id="tab-matches" class="section active"></div>
    <div id="tab-calendar" class="section"></div>
    <div id="tab-leaderboard" class="section"></div>
    <div id="tab-admin" class="section"></div>
  </div>

<!-- PIN MODAL -->
<div id="pin-modal" class="pin-modal" style="display:none">
  <div class="pin-box">
    <div class="pin-title" id="pin-modal-title">🔐 Ingresa tu PIN</div>
    <div class="pin-sub" id="pin-modal-sub">Perfil: <strong id="pin-modal-name"></strong></div>
    <div class="pin-dots" id="pin-dots">
      <div class="pin-dot" id="pd0"></div>
      <div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div>
      <div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-error" id="pin-error"></div>
    <div class="pin-keypad">
      <button class="pin-key" onclick="pinKey('1')">1</button>
      <button class="pin-key" onclick="pinKey('2')">2</button>
      <button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button>
      <button class="pin-key" onclick="pinKey('5')">5</button>
      <button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button>
      <button class="pin-key" onclick="pinKey('8')">8</button>
      <button class="pin-key" onclick="pinKey('9')">9</button>
      <button class="pin-key" style="visibility:hidden"></button>
      <button class="pin-key" onclick="pinKey('0')">0</button>
      <button class="pin-key del" onclick="pinDel()">⌫</button>

// Check if match is locked (1 hour before kickoff)
function isLocked(m){
  const kickoff = new Date(m.dt);
  const lockTime = new Date(kickoff.getTime() - 60*60*1000);
  return new Date() >= lockTime;
}

let STATE = {users:[], preds:{}, results:{}, pins:{}};
let CU = null;

function showError(msg){
  let el = document.getElementById("fb-err");
  if(!el){ el=document.createElement("div"); el.id="fb-err";
    el.style.cssText="background:#C8102E;color:#fff;padding:10px 16px;text-align:center;font-size:13px;font-weight:600;position:sticky;top:0;z-index:99";
    document.body.prepend(el); }
  el.style.display = msg ? "block" : "none";
  el.textContent = msg;
}

async function saveState(){
  await setDoc(REF, JSON.parse(JSON.stringify(STATE)));
}

onSnapshot(REF, snap => {
  const d = snap.exists() ? snap.data() : {};
  STATE.users   = d.users   || [];
  STATE.preds   = d.preds   || {};
  STATE.results = d.results || {};
  STATE.pins    = d.pins    || {};
  showError("");
  renderChips();
  if(CU){ renderMatches(); renderLeaderboard(); renderAdmin(); }
}, err => showError("⚠️ Firebase: " + err.message));

document.getElementById("name-input").addEventListener("keydown", e => { if(e.key==="Enter") doLogin(); });
document.querySelector(".btn-verde").addEventListener("click", doLogin);

function doLogin(){
  const n = document.getElementById("name-input").value.trim();
  const pin = document.getElementById("pin-input").value.trim();
  if(!n){ document.getElementById("name-input").focus(); return; }
  if(!pin||pin.length!==4||!/^\d{4}$/.test(pin)){
    document.getElementById("pin-input").focus();
    document.getElementById("pin-input").style.borderColor="var(--wc-red)";
    return;
  }
  // existing user: verify PIN
  if(STATE.users.includes(n)){
    if(STATE.pins[n] && STATE.pins[n]!==pin){
      document.getElementById("pin-input").style.borderColor="var(--wc-red)";
      document.getElementById("pin-input").value="";
      document.getElementById("pin-input").placeholder="PIN incorrecto";
      return;
    }
  }
  loginAs(n, pin);
}

async function loginAs(n, pin){
  const btn = document.querySelector(".btn-verde");
  btn.textContent = "Conectando..."; btn.disabled = true;
  try {
    if(!STATE.users.includes(n)) STATE.users.push(n);
    if(!STATE.preds[n]) STATE.preds[n] = {};
    if(pin) STATE.pins[n] = pin; // always save PIN when provided via form
    await saveState();
    CU = n;
    document.getElementById("login-section").style.display = "none";
    document.getElementById("main-app").style.display = "block";
    document.getElementById("welcome-msg").textContent = "👤 " + n;
    // show admin tab only for Juan
    const adminBtn=document.getElementById("tab-btn-admin");
    if(adminBtn) adminBtn.style.display=n==="Juan"?"":"none";
    renderMatches(); renderLeaderboard(); if(n==="Juan") renderAdmin();
  } catch(e){
    showError("⚠️ No se pudo conectar: " + e.message);
    btn.textContent = "⚽ Entrar a la quiniela"; btn.disabled = false;
  }
}

function renderChips(){
  const u = STATE.users || [];
  const sec = document.getElementById("saved-section");
  if(!u.length){ sec.style.display="none"; return; }
  sec.style.display = "block";
  document.getElementById("chips").innerHTML = u.map(n =>
    `<button class="chip" data-name="${n.replace(/"/g,"&quot;")}">👤 ${n}</button>`
  ).join("");
  document.querySelectorAll("#chips .chip").forEach(btn =>
    btn.addEventListener("click", () => {
      const upin=STATE.pins[btn.dataset.name];
      if(upin&&upin.length===4) showPinModal(btn.dataset.name);
      else loginAs(btn.dataset.name, null);
    })
  );
}

document.querySelector(".logout-btn").addEventListener("click", () => {
  CU = null;
  document.getElementById("login-section").style.display = "block";
  document.getElementById("main-app").style.display = "none";
  document.getElementById("name-input").value = "";
  const adminBtn=document.getElementById("tab-btn-admin");
  if(adminBtn) adminBtn.style.display="none";
  renderChips(); showTab("matches");
});

  const names = ["matches","calendar","leaderboard","admin"];
  tab.addEventListener("click", () => showTab(names[i]));
});

function showTab(t){
  if(t==="admin"&&CU!=="Juan") return;
  ["matches","calendar","leaderboard","admin"].forEach((x,i)=>{
    document.getElementById("tab-"+x).classList.toggle("active", x===t);
    document.querySelectorAll(".tab")[i].classList.toggle("active", x===t);
  });
  if(t==="leaderboard") renderLeaderboard();
  if(t==="admin"&&CU==="Juan") renderAdmin();
  if(t==="calendar") renderCalendar();
}

function calcPts(p,r){
  if(!p||!r) return -1;
  if(p.h===r.h && p.a===r.a) return 3;
  const pw = p.h>p.a?"h":p.h<p.a?"a":"d";
  const rw = r.h>r.a?"h":r.h<r.a?"a":"d";
  return pw===rw ? 1 : 0;
}

function renderMatches(){
  const my = STATE.preds[CU] || {};
  const res = STATE.results  || {};
  let lastDate="", html="";

  MATCHES.forEach(m => {
    // Use dt to get a clean date key for grouping
    const dtDate=m.dt.slice(0,10); // "2026-06-11"
    if(dtDate!==lastDate){
      // Format: "Jueves 11 Jun"
      const d=new Date(m.dt+'Z');
      const dias=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
      const meses=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
      const label=`${dias[d.getUTCDay()]} ${d.getUTCDate()} ${meses[d.getUTCMonth()]}`;
      html+=`<div class="date-sep">📅 ${label}</div>`;
      lastDate=dtDate;
    }
    const r=res[m.id], p=my[m.id], done=r!==undefined;
    const locked=isLocked(m);

    let center;
    if(done){
      center=`<div class="real-score-row"><span class="rscore">${r.h}</span><span class="rdash">–</span><span class="rscore">${r.a}</span></div>`;
    } else if(locked){
      if(p){
        center=`<div class="score-row">
          <input class="sinput" value="${p.h}" disabled>
          <span class="sdash">–</span>
          <input class="sinput" value="${p.a}" disabled>
        </div>`;
      } else {
        center=`<div class="score-row">
          <input class="sinput" placeholder="?" disabled>
          <span class="sdash">–</span>
          <input class="sinput" placeholder="?" disabled>
        </div>`;
      }
    } else {
      center=`<div class="score-row">
        <input class="sinput" id="ph_${m.id}" type="number" min="0" max="20" value="${p!==undefined?p.h:0}" placeholder="0">
        <span class="sdash">–</span>
        <input class="sinput" id="pa_${m.id}" type="number" min="0" max="20" value="${p!==undefined?p.a:0}" placeholder="0">
      </div>`;
    }

    let predRow="";
    if(p!==undefined){
      const pts=done?calcPts(p,r):-1;
      const pb=pts===3?`<span class="pts-badge pts3">⭐ +3 pts — exacto</span>`
              :pts===1?`<span class="pts-badge pts1">✓ +1 pt — resultado</span>`
              :pts===0?`<span class="pts-badge pts0">✗ 0 pts</span>`:"";
      predRow=`<div class="pred-row"><span class="pred-note">Mi pronóstico: ${p.h}–${p.a}</span>${pb}</div>`;
    }

    // All predictions (only shown when match is done)
    let allPredsRow="";
    if(done){
      const users=STATE.users||[];
      const items=users.map(u=>{
        const up=(STATE.preds[u]||{})[m.id];
        const pts=up?calcPts(up,r):-1;
        const cls=pts===3?'pts3':pts===1?'pts1':pts===0?'pts0':'nopred';
        const medal=pts===3?'⭐':pts===1?'✓':pts===0?'✗':'—';
        const scoreStr=up?`${up.h}–${up.a}`:'sin pron.';
        return`<div class="pred-item ${cls}">
          <span class="pred-item-name">${u===CU?'👤 '+u:u}</span>
          <span class="pred-item-score">${scoreStr} ${medal}</span>
        </div>`;
      }).join('');
      allPredsRow=`<div class="all-preds">
        <div class="all-preds-title" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'flex':'none';this.querySelector('.chevron').textContent=this.nextElementSibling.style.display==='none'?'▼':'▲'">
          <span>👥 Pronósticos del grupo (${users.length})</span>
          <span class="chevron">▼</span>
        </div>
        <div class="pred-list" style="display:none">${items}</div>
      </div>`;
    }

    let actionRow="";
    if(!done){
      if(locked){
        actionRow=`<div class="locked-msg">🔒 Pronóstico cerrado — el partido ya comenzó</div>`;
      } else {
        actionRow=`<button class="save-btn" data-id="${m.id}">Guardar pronóstico</button>`;
      }
    }

    let badgeLabel, badgeClass;
    if(done){ badgeLabel="✓ Finalizado"; badgeClass="badge-done"; }
    else if(locked){ badgeLabel="🔒 Cerrado"; badgeClass="badge-locked"; }
    else { badgeLabel="🔓 Abierto"; badgeClass="badge-open"; }

    html+=`<div class="match-card ${m.mc}${locked&&!done?' locked':''}">
      <div class="match-head">
        <span class="match-date">${m.date}${!done&&!locked?` <span class="countdown countdown-ok" id="cd_${m.id}">⏳</span>`:''}</span>
        <span class="badge ${badgeClass}">${badgeLabel}</span>
      </div>
      <div class="teams">
        <div class="team">${FLAG(m.hc)}<div class="team-name">${m.home}</div></div>
        <div class="vs-block">${center}</div>
        <div class="team">${FLAG(m.ac)}<div class="team-name">${m.away}</div></div>
      </div>
      ${predRow}
      ${actionRow}
      ${allPredsRow}
    </div>`;
  });

  document.getElementById("tab-matches").innerHTML = html;
  // start countdown timers
  startCountdowns();
  document.querySelectorAll(".save-btn[data-id]").forEach(btn =>
    btn.addEventListener("click", async () => {
      const id=btn.dataset.id;
      const m=MATCHES.find(x=>x.id===id);
      if(m&&isLocked(m)){ return; }
      const hEl=document.getElementById("ph_"+id);
      const aEl=document.getElementById("pa_"+id);
      const h=hEl?(hEl.value===""?"0":hEl.value):"0";
      const a=aEl?(aEl.value===""?"0":aEl.value):"0";
      if(!STATE.preds[CU]) STATE.preds[CU]={};
      STATE.preds[CU][id]={h:parseInt(h),a:parseInt(a)};
      try {
        await saveState();
        btn.textContent="✓ ¡Guardado!"; btn.classList.add("save-ok");
        setTimeout(()=>{ btn.textContent="Guardar pronóstico"; btn.classList.remove("save-ok"); },1600);
        renderLeaderboard();
      } catch(e){ showError("⚠️ Error al guardar: "+e.message); }
    })
  );
}

let _cdInterval=null;
function startCountdowns(){
  if(_cdInterval)clearInterval(_cdInterval);
  _cdInterval=setInterval(updateCountdowns,1000);
  updateCountdowns();
}
function updateCountdowns(){
  const res=STATE.results||{};
  let anyOpen=false;
  MATCHES.forEach(m=>{
    const el=document.getElementById('cd_'+m.id);
    if(!el)return;
    const done=res[m.id]!==undefined;
    if(done){el.style.display='none';return;}
    const kickoff=new Date(m.dt);
    const lockTime=new Date(kickoff.getTime()-60*60*1000);
    const now=new Date();
    const diff=lockTime-now;
    if(diff<=0){
      // just locked - re-render
      clearInterval(_cdInterval);
      renderMatches();
      return;
    }
    anyOpen=true;
    const totalSec=Math.floor(diff/1000);
    const d=Math.floor(totalSec/86400);
    const h=Math.floor((totalSec%86400)/3600);
    const min=Math.floor((totalSec%3600)/60);
    const sec=totalSec%60;
    let txt,cls;
    if(d>0){txt=`⏳ Cierra en ${d}d ${h}h`;cls='countdown-ok';}
    else if(h>0){txt=`⏳ Cierra en ${h}h ${min}m`;cls='countdown-ok';}
    else if(min>=30){txt=`⏳ ${min}m ${sec}s`;cls='countdown-ok';}
    else if(min>=10){txt=`⚠️ ${min}m ${sec}s`;cls='countdown-warn';}
    else{txt=`🔴 ${min}m ${sec}s`;cls='countdown-urgent';}
    el.textContent=txt;
    el.className='countdown '+cls;
  });
}

function calcUserStats(user){
  const p=STATE.preds[user]||{}, res=STATE.results||{};
  let pts=0,ex=0,win=0,played=0;
  MATCHES.forEach(m=>{
    const r=res[m.id], pr=p[m.id];
    if(pr) played++;
    if(!r||!pr) return;
    const g=calcPts(pr,r);
    if(g===3) ex++; else if(g===1) win++;
    if(g>=0) pts+=g;
  });
  return{pts,ex,win,played};
}

function renderLeaderboard(){
  const users=STATE.users||[];
  if(!users.length){
    document.getElementById("tab-leaderboard").innerHTML=`<p style="text-align:center;padding:2rem;font-size:14px;color:#888">Aún no hay jugadores.</p>`;
    return;
  }
  const sc=users.map(u=>({name:u,...calcUserStats(u)})).sort((a,b)=>b.pts-a.pts||b.ex-a.ex);
  const rows=sc.map((u,i)=>{
    const cl=i===0?"gold":i===1?"silver":"";
    const medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1;
    const me=u.name===CU?" lb-me":"";
    return`<div class="lb-row ${cl}"><div class="lb-rank">${medal}</div><div class="lb-name${me}">${u.name}${u.name===CU?" 👈":""}</div><div class="lb-num">${u.played}</div><div class="lb-num">${u.ex}</div><div class="lb-num">${u.win}</div><div class="lb-pts">${u.pts}</div></div>`;
  }).join("");
  document.getElementById("tab-leaderboard").innerHTML=
    `<div class="lb-wrap"><div class="lb-header-row"><div></div><div>Jugador</div><div style="text-align:center">Pron.</div><div style="text-align:center">Exactos</div><div style="text-align:center">Ganad.</div><div style="text-align:center">Pts</div></div>${rows}</div>
     <div class="legend"><div class="legend-seg"><p>+3</p><span>⭐ Exacto</span></div><div class="legend-seg"><p>+1</p><span>✓ Resultado</span></div><div class="legend-seg"><p>0</p><span>✗ Fallaste</span></div></div>`;
}

function renderAdmin(){
  const res=STATE.results||{};
  let html=`<div class="admin-info">🛡️ Ingresa los resultados reales y gestiona usuarios.</div>
  <div style="background:#fff;border:1px solid #e0e0d8;border-radius:14px;padding:13px 15px;margin-bottom:16px">
    <div style="font-size:13px;font-weight:700;margin-bottom:10px">👥 Usuarios registrados</div>
    ${(STATE.users||[]).map(u=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:0.5px solid #f0f0ea;font-size:13px">
      <span style="font-weight:600">${u} ${STATE.pins[u]?'🔐':''}</span>
      <div style="display:flex;gap:6px">
        <button onclick="adminResetPin('${u}')" style="padding:4px 10px;font-size:11px;background:#fff3cd;border:1px solid #ffc107;color:#856404;border-radius:6px;cursor:pointer;font-weight:600">Reset PIN</button>
      </div>
    </div>`).join('')}

      <div class="admin-card-top">

        ${rl}
      </div>

      <div class="admin-row">
        <label>Resultado:</label>
        <input class="ainput" id="rh_${m.id}" type="number" min="0" max="20" value="${r?r.h:""}" placeholder="0">
        <span style="font-size:18px;color:#ccc;font-weight:700">–</span>
        <input class="ainput" id="ra_${m.id}" type="number" min="0" max="20" value="${r?r.a:""}" placeholder="0">
        <button class="set-btn" data-id="${m.id}">Guardar</button>
        ${r?`<button class="del-btn" data-id="${m.id}">Borrar</button>`:""}
      </div>
    </div>`;
  });
  document.getElementById("tab-admin").innerHTML = html;

    btn.addEventListener("click", async () => {
      delete STATE.results[btn.dataset.id];
      try{ await saveState(); renderAdmin(); renderMatches(); renderLeaderboard(); }catch(e){ showError("⚠️ Error: "+e.message); }
    })
  );
}


/* ---- PIN MODAL ---- */
let _pinBuffer='';
let _pinTarget=null;

function showPinModal(name){
  _pinBuffer='';
  _pinTarget=name;
  document.getElementById('pin-modal-name').textContent=name;
  document.getElementById('pin-error').textContent='';
  updatePinDots();
  document.getElementById('pin-modal').style.display='flex';
}

function closePinModal(){
  document.getElementById('pin-modal').style.display='none';
  _pinBuffer='';_pinTarget=null;
}

function pinKey(k){
  if(_pinBuffer.length>=4)return;
  _pinBuffer+=k;
  updatePinDots();
  if(_pinBuffer.length===4) setTimeout(checkPin,150);
}

function pinDel(){
  _pinBuffer=_pinBuffer.slice(0,-1);
  updatePinDots();
  document.getElementById('pin-error').textContent='';
}

function updatePinDots(){
  for(let i=0;i<4;i++){
    document.getElementById('pd'+i).classList.toggle('filled',i<_pinBuffer.length);
  }
}

async function checkPin(){
  const correct=STATE.pins[_pinTarget];
  if(!correct){
    // no PIN set yet — enter directly
    closePinModal();
    await loginAs(_pinTarget, null);
  } else if(_pinBuffer===correct){
    closePinModal();
    await loginAs(_pinTarget, null);
  } else {
    document.getElementById('pin-error').textContent='PIN incorrecto, intenta de nuevo';
    _pinBuffer='';
    updatePinDots();
  }
}

function adminResetPin(user){
  if(!confirm('¿Resetear el PIN de '+user+'? Podrá ingresar sin PIN la próxima vez.'))return;
  delete STATE.pins[user];
  saveState().then(()=>{renderAdmin();alert('PIN de '+user+' reseteado ✓');});
}

/* ---- CALENDARIO ---- */
let calYear=2026, calMonth=5; // 0-indexed, 5=June

const MONTH_NAMES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DOW=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

function renderCalendar(){
  const res=STATE.results||{};
  const my=(STATE.preds&&STATE.preds[CU])||{};
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const today=new Date();

  // Group matches by day
  const byDay={};
  MATCHES.forEach(m=>{
    const d=new Date(m.dt+'Z');
    if(d.getUTCFullYear()===calYear && d.getUTCMonth()===calMonth){
      const day=d.getUTCDate();
      if(!byDay[day])byDay[day]=[];
      byDay[day].push(m);
    }
  });

  let html=`<div class="cal-nav">
    <button class="cal-nav-btn" onclick="calPrev()">‹</button>
    <span class="cal-month">${MONTH_NAMES[calMonth]} ${calYear}</span>
    <button class="cal-nav-btn" onclick="calNext()">›</button>
  </div>
  <div class="cal-grid">`;

  // Day of week headers
  DOW.forEach(d=>html+=`<div class="cal-dow">${d}</div>`);

  // Empty cells before first day
  for(let i=0;i<firstDay;i++) html+=`<div class="cal-day empty"></div>`;

  // Days
  for(let day=1;day<=daysInMonth;day++){
    const isToday=today.getDate()===day&&today.getMonth()===calMonth&&today.getFullYear()===calYear;
    const matches=byDay[day]||[];
    const MAX_SHOW=3;
    let chips='';
    matches.slice(0,MAX_SHOW).forEach(m=>{
      const done=res[m.id]!==undefined;
      const locked=isLocked(m);
      const hasPred=my[m.id]!==undefined;
      let cls=done?'done':locked?'locked':(hasPred?'pred':'open');
      const hora=m.dt.slice(11,16);
      const label=`${hora} ${m.home.split(' ')[0]} vs ${m.away.split(' ')[0]}`;
      chips+=`<span class="cal-match-chip ${cls}" onclick="showCalMatch('${m.id}')">${label}</span>`;
    });
    if(matches.length>MAX_SHOW) chips+=`<div class="cal-more">+${matches.length-MAX_SHOW} más</div>`;
    html+=`<div class="cal-day${isToday?' today':''}">
      <div class="cal-day-num">${day}</div>
      ${chips}
    </div>`;
  }
  html+='</div>';

  // legend
  html+=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;font-size:11px">
    <span style="display:flex;align-items:center;gap:3px"><span style="width:10px;height:10px;background:#e8eeff;border-radius:3px;display:inline-block"></span>Abierto</span>
    <span style="display:flex;align-items:center;gap:3px"><span style="width:10px;height:10px;background:#EAF3DE;border-radius:3px;display:inline-block"></span>Con pronóstico</span>
    <span style="display:flex;align-items:center;gap:3px"><span style="width:10px;height:10px;background:#fff3cd;border-radius:3px;display:inline-block"></span>Cerrado</span>
    <span style="display:flex;align-items:center;gap:3px"><span style="width:10px;height:10px;background:#e8ffe8;border-radius:3px;display:inline-block"></span>Finalizado</span>
  </div>`;

  document.getElementById('tab-calendar').innerHTML=html;
}

function calPrev(){
  calMonth--;
  if(calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
}
function calNext(){
  calMonth++;
  if(calMonth>11){calMonth=0;calYear++;}
  renderCalendar();
}

function showCalMatch(id){
  const m=MATCHES.find(x=>x.id===id);
  if(!m)return;
  const res=STATE.results||{};
  const my=(STATE.preds&&STATE.preds[CU])||{};
  const r=res[m.id], p=my[m.id], done=r!==undefined, locked=isLocked(m);
  const hora=m.dt.slice(11,16);

  let center;
  if(done){
    center=`<div class="real-score-row" style="justify-content:center"><span class="rscore">${r.h}</span><span class="rdash">–</span><span class="rscore">${r.a}</span></div>`;
  } else if(locked){
    center=`<div class="score-row" style="justify-content:center">
      <input class="sinput" value="${p?p.h:''}" disabled placeholder="?">
      <span class="sdash">–</span>
      <input class="sinput" value="${p?p.a:''}" disabled placeholder="?">
    </div>`;
  } else {
    center=`<div class="score-row" style="justify-content:center">
      <input class="sinput" id="cph_${m.id}" type="number" min="0" max="20" value="${p!==undefined?p.h:''}" placeholder="0">
      <span class="sdash">–</span>
      <input class="sinput" id="cpa_${m.id}" type="number" min="0" max="20" value="${p!==undefined?p.a:''}" placeholder="0">
    </div>`;
  }

  let pts='';
  if(p&&done){
    const g=calcPts(p,r);
    pts=g===3?`<span class="pts-badge pts3">⭐ +3 exacto</span>`:g===1?`<span class="pts-badge pts1">✓ +1 resultado</span>`:`<span class="pts-badge pts0">✗ 0 pts</span>`;
  }

  const modal=document.createElement('div');
  modal.className='cal-modal';
  modal.innerHTML=`<div class="cal-modal-box">
    <div class="cal-modal-title">
      <span>${m.group} · ${m.date}</span>
      <button class="cal-modal-close" onclick="this.closest('.cal-modal').remove()">✕</button>
    </div>
    <div class="teams" style="margin-bottom:12px">
      <div class="team">${FLAG(m.hc)}<div class="team-name">${m.home}</div></div>
      <div class="vs-block">${center}</div>
      <div class="team">${FLAG(m.ac)}<div class="team-name">${m.away}</div></div>
    </div>
    ${pts?`<div style="text-align:center;margin-bottom:10px">${pts}</div>`:''}
    ${p&&!done?`<div style="text-align:center;font-size:12px;color:#888;margin-bottom:8px">Mi pronóstico: ${p.h}–${p.a}</div>`:''}
    ${!done&&!locked?`<button class="save-btn" id="cal-save-${m.id}">Guardar pronóstico</button>`:''}
    ${locked&&!done?`<div class="locked-msg">🔒 Pronóstico cerrado</div>`:''}
  </div>`;
  document.body.appendChild(modal);
  modal.addEventListener('click',e=>{if(e.target===modal)modal.remove();});

  const saveBtn=document.getElementById('cal-save-'+m.id);
  if(saveBtn){
    saveBtn.addEventListener('click',async()=>{
      const h=document.getElementById('cph_'+m.id)?.value;
      const a=document.getElementById('cpa_'+m.id)?.value;
      if(h===''||a==='')return;
      if(!STATE.preds[CU])STATE.preds[CU]={};
      STATE.preds[CU][m.id]={h:parseInt(h),a:parseInt(a)};
      try{
        await saveState();
        saveBtn.textContent='✓ ¡Guardado!';saveBtn.classList.add('save-ok');
        setTimeout(()=>modal.remove(),1200);
        renderCalendar();renderLeaderboard();
      }catch(e){showError('⚠️ Error: '+e.message);}
    });
  }
}
